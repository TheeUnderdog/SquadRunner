name: Bug Report
description: Report a bug or issue
title: "[Bug] "
labels: ["bug", "squad", "priority:P1"]
body:
  - type: markdown
    attributes:
      value: |
        Report a bug that needs to be fixed.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical - System unusable
        - High - Major feature broken
        - Medium - Feature impaired
        - Low - Minor issue
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What's happening?
      placeholder: When I click the submit button, nothing happens...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: The form should submit and show a success message
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: Nothing happens, no error message
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where does this happen?
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Version: 1.2.3

  - type: textarea
    id: logs
    attributes:
      label: Logs/Screenshots
      description: Any relevant logs or screenshots
