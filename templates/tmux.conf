# SquadRunner tmux Configuration
# Copy to ~/.tmux.conf on the VM

# Use Ctrl-a as prefix (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '[#S] '
set -g status-left-length 20
set -g status-right '%H:%M %d-%b-%y'
set -g status-right-length 40

# Window status
setw -g window-status-current-style 'fg=#1e1e2e bg=#89b4fa bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=#cdd6f4'
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# Easy pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Easy pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Easy window navigation
bind -n M-Left previous-window
bind -n M-Right next-window

# Copy mode with vi keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Quick commands
bind S new-window -n squad "squad watch; read"
bind L new-window -n logs "tail -f ~/.squad/logs/squad.log"

# SquadRunner session setup
# Run this to create a standard session:
#   tmux new-session -d -s squad -n watch
#   tmux send-keys -t squad:watch "squad watch" Enter
#   tmux attach -t squad
